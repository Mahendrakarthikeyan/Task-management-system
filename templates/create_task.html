{% extends "base.html" %}
{% block title %}Create Task{% endblock title %}
{% block content %}

<div class="form-card">
  <a href="{{ url_for('task.dashboard') }}" class="back-link">
    <i class="ph-bold ph-arrow-left"></i>
    Back to dashboard
  </a>

  <div class="card">
    <div class="card-header">
      <h2>New Task</h2>
      <p class="text-secondary text-sm">Add a new task</p>
    </div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label" for="title">Task Title</label>
          <input type="text" class="form-input" id="title" name="title" placeholder="What needs to be done?" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="description">Description</label>
          <textarea class="form-textarea" id="description" name="description" rows="3" placeholder="Optional details"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="priority">Priority</label>
          <select class="form-select" id="priority" name="priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="category">Category</label>
          <input type="text" class="form-input" id="category" name="category" placeholder="e.g. Work, Personal">
        </div>
        <div class="form-group">
          <label class="form-label" for="due_date">Due Date</label>
          <input type="date" class="form-input" id="due_date" name="due_date">
        </div>
        <div class="form-actions">
          <a href="{{ url_for('task.dashboard') }}" class="btn btn-ghost">Cancel</a>
          <button type="submit" class="btn btn-primary">
            <i class="ph-bold ph-check"></i>Create Task
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock content %}
