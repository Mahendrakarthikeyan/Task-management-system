{% extends "base.html" %}
{% block title %}Register{% endblock title %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="card">
      <div class="card-header">
        <h2>Create account</h2>
        <p>Start managing your tasks</p>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" class="form-input" id="username" name="username" placeholder="Choose a username" required autofocus>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" class="form-input" id="email" name="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-input" id="password" name="password" placeholder="At least 6 characters" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm_password">Confirm Password</label>
            <input type="password" class="form-input" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required>
          </div>
          <div class="form-group">
            <button type="submit" class="btn btn-primary" style="width:100%">
              <i class="ph-bold ph-user-plus"></i>
              Create account
            </button>
          </div>
        </form>
        <div class="form-footer">
          Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
