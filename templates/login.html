{% extends "base.html" %}
{% block title %}Login{% endblock title %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <i class="ph-bold ph-check-square"></i>
    </div>
    <div class="card">
      <div class="card-header">
        <h2>Welcome back</h2>
        <p>Sign in to your account</p>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" class="form-input" id="username" name="username" placeholder="Your username" required autofocus>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-input" id="password" name="password" placeholder="Your password" required>
          </div>
          <div class="form-group">
            <button type="submit" class="btn btn-primary btn-block">
              <i class="ph-bold ph-arrow-right"></i>
              Sign in
            </button>
          </div>
        </form>
        <div class="form-footer">
          Don&rsquo;t have an account? <a href="{{ url_for('auth.register') }}">Register</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
